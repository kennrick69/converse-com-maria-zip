<svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="plantStem" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#228B22"/>
      <stop offset="100%" style="stop-color:#32CD32"/>
    </linearGradient>
    <linearGradient id="plantLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90"/>
      <stop offset="100%" style="stop-color:#32CD32"/>
    </linearGradient>
    <linearGradient id="plantPot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D2691E"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <linearGradient id="plantHeart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/>
      <stop offset="100%" style="stop-color:#FF1493"/>
    </linearGradient>
  </defs>
  
  <!-- Brilhos e sol -->
  <circle cx="52" cy="12" r="8" fill="#FFD700" opacity="0.3"/>
  <circle cx="52" cy="12" r="5" fill="#FFD700" opacity="0.5"/>
  
  <!-- Raios de sol -->
  <line x1="52" y1="2" x2="52" y2="6" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="12" x2="62" y2="12" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="6" x2="60" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="18" x2="60" y2="20" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Estrelinhas -->
  <path d="M8 16L10 20L8 24L12 22L16 24L14 20L16 16L12 18L8 16Z" fill="#FFD700" opacity="0.6"/>
  <circle cx="12" cy="50" r="2" fill="#FF69B4" opacity="0.5"/>
  
  <!-- Vaso/pote -->
  <path d="M18 52 L22 62 L42 62 L46 52 Z" fill="url(#plantPot)" stroke="#6B4423" stroke-width="2"/>
  <path d="M16 48 L18 52 L46 52 L48 48 Q32 46 16 48Z" fill="#8B4513"/>
  
  <!-- Terra -->
  <ellipse cx="32" cy="50" rx="12" ry="3" fill="#4A3728"/>
  
  <!-- Caule -->
  <path d="M32 48 Q32 36 32 28" stroke="url(#plantStem)" stroke-width="4" stroke-linecap="round" fill="none"/>
  
  <!-- Folhas -->
  <path d="M32 38 Q22 34 18 24 Q24 28 32 36" fill="url(#plantLeaf)"/>
  <path d="M32 38 Q42 34 46 24 Q40 28 32 36" fill="url(#plantLeaf)"/>
  
  <!-- Folhinhas menores -->
  <path d="M32 30 Q26 26 24 20 Q28 24 32 28" fill="url(#plantLeaf)"/>
  <path d="M32 30 Q38 26 40 20 Q36 24 32 28" fill="url(#plantLeaf)"/>
  
  <!-- Broto no topo -->
  <ellipse cx="32" cy="20" rx="4" ry="6" fill="#90EE90"/>
  <ellipse cx="30" cy="18" rx="2" ry="3" fill="#ADFF2F" opacity="0.6"/>
  
  <!-- Coraçãozinho na folha -->
  <path d="M22 28 Q22 25 24 25 Q25 25 25 27 Q25 25 26 25 Q28 25 28 28 Q28 30 25 32 Q22 30 22 28Z" 
        fill="url(#plantHeart)" opacity="0.8"/>
  
  <!-- Gotinha de água -->
  <path d="M44 38 Q46 34 48 38 Q46 42 44 38Z" fill="#87CEEB" opacity="0.7"/>
