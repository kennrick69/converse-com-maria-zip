<svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="onbCrown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="onbJewel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#4169E1"/>
    </linearGradient>
    <filter id="onbCrownGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Brilhos -->
  <circle cx="8" cy="16" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="56" cy="14" r="2.5" fill="#FFD700" opacity="0.6"/>
  
  <!-- Estrelinhas -->
  <path d="M6 32L8 36L6 40L10 38L14 40L12 36L14 32L10 34L6 32Z" fill="#FFD700" opacity="0.5"/>
  <path d="M50 32L52 36L50 40L54 38L58 40L56 36L58 32L54 34L50 32Z" fill="#FFD700" opacity="0.5"/>
  
  <!-- Coroa principal -->
  <path d="M8 52 L8 28 L18 38 L26 20 L32 32 L38 20 L46 38 L56 28 L56 52 Z" 
        fill="url(#onbCrown)" 
        stroke="#B8860B" 
        stroke-width="2"
        filter="url(#onbCrownGlow)"/>
  
  <!-- Base da coroa -->
  <rect x="8" y="52" width="48" height="8" rx="2" fill="url(#onbCrown)" stroke="#B8860B" stroke-width="1.5"/>
  
  <!-- Jóia central (safira) -->
  <circle cx="32" cy="42" r="5" fill="url(#onbJewel)"/>
  <ellipse cx="30" cy="40" rx="2" ry="1.5" fill="white" opacity="0.5"/>
  
  <!-- Jóias menores -->
  <circle cx="18" cy="40" r="3" fill="#FF69B4"/>
  <circle cx="46" cy="40" r="3" fill="#FF69B4"/>
  
  <!-- Bolinhas no topo das pontas -->
  <circle cx="26" cy="20" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <circle cx="32" cy="14" r="4" fill="#87CEEB" stroke="#B8860B" stroke-width="1"/>
  <circle cx="38" cy="20" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Detalhes dourados na base -->
  <line x1="20" y1="52" x2="20" y2="60" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="52" x2="32" y2="60" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="52" x2="44" y2="60" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
</svg>
