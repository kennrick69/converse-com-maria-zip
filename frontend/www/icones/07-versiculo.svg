<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#654321"/>
    </linearGradient>
    <linearGradient id="bookPages" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFAF0"/>
      <stop offset="100%" style="stop-color:#F5F5DC"/>
    </linearGradient>
    <linearGradient id="divineLight" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" style="stop-color:#FFFACD" stop-opacity="0"/>
    </linearGradient>
    <filter id="bookGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Raios de luz divina -->
  <ellipse cx="32" cy="24" rx="24" ry="20" fill="url(#divineLight)"/>
  
  <!-- Brilhos decorativos -->
  <circle cx="10" cy="8" r="2.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="54" cy="10" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="8" cy="56" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="56" cy="54" r="2.5" fill="#FFD700" opacity="0.5"/>
  
  <!-- Estrelinhas -->
  <path d="M18 6L20 10L18 14L22 12L26 14L24 10L26 6L22 8L18 6Z" fill="#FFD700"/>
  <path d="M38 6L40 10L38 14L42 12L46 14L44 10L46 6L42 8L38 6Z" fill="#FFD700"/>
  
  <!-- Capa do livro (fundo) -->
  <path d="M6 24 Q6 20 10 20 L30 20 Q32 20 32 22 L32 54 Q32 56 30 56 L10 56 Q6 56 6 52 Z" 
        fill="url(#bookCover)" stroke="#5D3A1A" stroke-width="1.5"/>
  <path d="M58 24 Q58 20 54 20 L34 20 Q32 20 32 22 L32 54 Q32 56 34 56 L54 56 Q58 56 58 52 Z" 
        fill="url(#bookCover)" stroke="#5D3A1A" stroke-width="1.5"/>
  
  <!-- Páginas abertas -->
  <path d="M10 24 Q10 22 12 22 L28 22 Q32 22 32 26 L32 52 Q32 54 28 54 L12 54 Q10 54 10 52 Z" 
        fill="url(#bookPages)"/>
  <path d="M54 24 Q54 22 52 22 L36 22 Q32 22 32 26 L32 52 Q32 54 36 54 L52 54 Q54 54 54 52 Z" 
        fill="url(#bookPages)"/>
  
  <!-- Linhas de texto (página esquerda) -->
  <line x1="14" y1="28" x2="26" y2="28" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="33" x2="28" y2="33" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="38" x2="24" y2="38" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="43" x2="27" y2="43" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="48" x2="22" y2="48" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Linhas de texto (página direita) -->
  <line x1="38" y1="28" x2="50" y2="28" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="33" x2="50" y2="33" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="38" x2="48" y2="38" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="43" x2="50" y2="43" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="48" x2="46" y2="48" stroke="#C4A77D" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Cruz dourada no centro (lombada) -->
  <rect x="30" y="20" width="4" height="36" fill="#DAA520"/>
  <rect x="29" y="36" width="6" height="4" fill="#DAA520"/>
  
  <!-- Marcador de página (fita) -->
  <path d="M44 20 L44 12 L46 14 L48 12 L48 20" fill="#DC143C"/>
  
  <!-- Brilho no livro -->
  <ellipse cx="20" cy="26" rx="4" ry="2" fill="white" opacity="0.3"/>
</svg>
