<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="crownGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="crownJewel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/>
      <stop offset="100%" style="stop-color:#DC143C"/>
    </linearGradient>
    <linearGradient id="crownJewel2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#4169E1"/>
    </linearGradient>
    <linearGradient id="crownJewel3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98"/>
      <stop offset="100%" style="stop-color:#32CD32"/>
    </linearGradient>
    <filter id="crownGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Brilhos de fundo -->
  <circle cx="10" cy="10" r="3" fill="#FFD700" opacity="0.5"/>
  <circle cx="54" cy="12" r="2.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="8" cy="54" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="56" cy="50" r="2.5" fill="#FFD700" opacity="0.5"/>
  
  <!-- Estrelinhas -->
  <path d="M14 20L16 24L14 28L18 26L22 28L20 24L22 20L18 22L14 20Z" fill="#FFD700" opacity="0.7"/>
  <path d="M42 20L44 24L42 28L46 26L50 28L48 24L50 20L46 22L42 20Z" fill="#FFD700" opacity="0.7"/>
  
  <!-- Coroa principal -->
  <path d="M8 48 L8 32 L18 40 L26 24 L32 36 L38 24 L46 40 L56 32 L56 48 Z" 
        fill="url(#crownGold)" 
        stroke="#B8860B" 
        stroke-width="2"
        filter="url(#crownGlow)"/>
  
  <!-- Base da coroa -->
  <rect x="8" y="48" width="48" height="8" rx="2" fill="url(#crownGold)" stroke="#B8860B" stroke-width="1.5"/>
  
  <!-- Detalhes dourados na base -->
  <line x1="16" y1="48" x2="16" y2="56" stroke="#B8860B" stroke-width="1"/>
  <line x1="32" y1="48" x2="32" y2="56" stroke="#B8860B" stroke-width="1"/>
  <line x1="48" y1="48" x2="48" y2="56" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Jóia central (rubi) -->
  <circle cx="32" cy="40" r="5" fill="url(#crownJewel)" filter="url(#crownGlow)"/>
  <ellipse cx="30" cy="38" rx="1.5" ry="1" fill="white" opacity="0.5"/>
  
  <!-- Jóias laterais -->
  <circle cx="18" cy="38" r="3.5" fill="url(#crownJewel2)"/>
  <ellipse cx="16.5" cy="36.5" rx="1" ry="0.7" fill="white" opacity="0.4"/>
  
  <circle cx="46" cy="38" r="3.5" fill="url(#crownJewel3)"/>
  <ellipse cx="44.5" cy="36.5" rx="1" ry="0.7" fill="white" opacity="0.4"/>
  
  <!-- Bolinhas no topo das pontas -->
  <circle cx="26" cy="24" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <circle cx="32" cy="18" r="3.5" fill="#FF69B4" stroke="#B8860B" stroke-width="1"/>
  <circle cx="38" cy="24" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Brilhos nas bolinhas -->
  <circle cx="31" cy="17" r="1" fill="white" opacity="0.6"/>
</svg>
