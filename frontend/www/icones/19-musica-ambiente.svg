<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="musicBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#E8D5B7"/>
            <stop offset="100%" style="stop-color:#D4B896"/>
        </linearGradient>
        <linearGradient id="musicNote" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8B4513"/>
            <stop offset="100%" style="stop-color:#5D3A1A"/>
        </linearGradient>
        <linearGradient id="musicHeart" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF69B4"/>
            <stop offset="100%" style="stop-color:#FF1493"/>
        </linearGradient>
        <linearGradient id="musicWave" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700"/>
            <stop offset="100%" style="stop-color:#FFA500"/>
        </linearGradient>
        <filter id="musicGlow">
            <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    
    <!-- Círculo de fundo -->
    <circle cx="32" cy="32" r="28" fill="url(#musicBg)" stroke="#B8860B" stroke-width="2.5"/>
    
    <!-- Ondas sonoras decorativas -->
    <path d="M12 28 Q14 32 12 36" stroke="url(#musicWave)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M8 24 Q12 32 8 40" stroke="url(#musicWave)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M52 28 Q50 32 52 36" stroke="url(#musicWave)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M56 24 Q52 32 56 40" stroke="url(#musicWave)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
    
    <!-- Nota musical principal (colcheia dupla) -->
    <rect x="22" y="20" width="4" height="22" rx="2" fill="url(#musicNote)"/>
    <rect x="38" y="24" width="4" height="18" rx="2" fill="url(#musicNote)"/>
    <path d="M24 20 Q31 16 40 24" stroke="url(#musicNote)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <ellipse cx="20" cy="44" rx="6" ry="4" fill="url(#musicNote)" transform="rotate(-20 20 44)"/>
    <ellipse cx="36" cy="44" rx="6" ry="4" fill="url(#musicNote)" transform="rotate(-20 36 44)"/>
    
    <!-- Coraçãozinho -->
    <path d="M48 14 Q48 10 51 10 Q53 10 53 13 Q53 10 55 10 Q58 10 58 14 Q58 18 53 22 Q48 18 48 14Z" fill="url(#musicHeart)" filter="url(#musicGlow)"/>
    
    <!-- Estrelinhas decorativas -->
    <circle cx="14" cy="16" r="2" fill="#FFD700" opacity="0.9"/>
    <circle cx="50" cy="48" r="1.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="18" cy="50" r="1.5" fill="#FFD700" opacity="0.7"/>
    
    <!-- Brilhos nas notas -->
    <circle cx="19" cy="42" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="35" cy="42" r="1.5" fill="#fff" opacity="0.6"/>
</svg>
