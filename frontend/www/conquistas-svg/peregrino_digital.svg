<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgSea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="compass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </linearGradient>
    <linearGradient id="needle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgSea)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#a5f3fc" stroke-width="3" opacity="0.5"/>
  
  <!-- Bússola/compasso -->
  <circle cx="50" cy="50" r="30" fill="url(#compass)"/>
  <circle cx="50" cy="50" r="27" fill="#fef9c3"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#ca8a04" stroke-width="2"/>
  
  <!-- Marcadores de direção -->
  <text x="50" y="30" text-anchor="middle" fill="#991b1b" font-family="Arial Black" font-size="10" font-weight="bold">N</text>
  <text x="50" y="77" text-anchor="middle" fill="#78350f" font-family="Arial" font-size="8">S</text>
  <text x="27" y="54" text-anchor="middle" fill="#78350f" font-family="Arial" font-size="8">O</text>
  <text x="73" y="54" text-anchor="middle" fill="#78350f" font-family="Arial" font-size="8">L</text>
  
  <!-- Agulha -->
  <polygon points="50,25 46,50 50,45 54,50" fill="url(#needle)"/>
  <polygon points="50,75 46,50 50,55 54,50" fill="#e2e8f0"/>
  
  <!-- Centro -->
  <circle cx="50" cy="50" r="4" fill="#ca8a04"/>
  <circle cx="50" cy="50" r="2" fill="#fef9c3"/>
  
  <!-- Cruz (destino espiritual) -->
  <rect x="48" y="15" width="4" height="8" rx="1" fill="#fff"/>
  <rect x="46" y="17" width="8" height="3" rx="1" fill="#fff"/>
  
  <!-- Estrelas -->
  <circle cx="20" cy="25" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="82" cy="30" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="25" cy="78" r="1.5" fill="#fff" opacity="0.6"/>
</svg>
