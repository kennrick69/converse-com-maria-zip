<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgRose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fda4af"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe4e6"/>
      <stop offset="100%" style="stop-color:#fb7185"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgRose)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fecdd3" stroke-width="3" opacity="0.5"/>
  
  <!-- Rosa - pétalas -->
  <circle cx="50" cy="40" r="18" fill="url(#rose)"/>
  <ellipse cx="42" cy="35" rx="10" ry="12" fill="#fecdd3" transform="rotate(-30 42 35)"/>
  <ellipse cx="58" cy="35" rx="10" ry="12" fill="#fecdd3" transform="rotate(30 58 35)"/>
  <ellipse cx="45" cy="48" rx="8" ry="10" fill="#fecdd3" transform="rotate(-15 45 48)"/>
  <ellipse cx="55" cy="48" rx="8" ry="10" fill="#fecdd3" transform="rotate(15 55 48)"/>
  <!-- Centro da rosa -->
  <circle cx="50" cy="40" r="6" fill="#fda4af"/>
  <circle cx="50" cy="40" r="3" fill="#fb7185"/>
  
  <!-- Folhas -->
  <ellipse cx="32" cy="55" rx="8" ry="5" fill="url(#leaf)" transform="rotate(-45 32 55)"/>
  <ellipse cx="68" cy="55" rx="8" ry="5" fill="url(#leaf)" transform="rotate(45 68 55)"/>
  
  <!-- Caule -->
  <line x1="50" y1="58" x2="50" y2="78" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Mini terço no caule -->
  <circle cx="50" cy="68" r="3" fill="#fef9c3"/>
  <circle cx="50" cy="75" r="2.5" fill="#fef9c3"/>
  <rect x="48" y="78" width="4" height="6" rx="1" fill="#fde047"/>
  
  <!-- Brilhos -->
  <circle cx="44" cy="32" r="2" fill="#fff" opacity="0.7"/>
</svg>
