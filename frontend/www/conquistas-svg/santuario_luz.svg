<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="candle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="50%" style="stop-color:#fffbeb"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="70%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="40%" style="stop-color:#fde047"/>
      <stop offset="80%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgOrange)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fed7aa" stroke-width="3" opacity="0.5"/>
  
  <!-- Vela central (mais alta) -->
  <rect x="44" y="45" width="12" height="35" rx="2" fill="url(#candle)"/>
  <ellipse cx="50" cy="32" rx="6" ry="10" fill="url(#flame)"/>
  <ellipse cx="50" cy="35" rx="2.5" ry="5" fill="#fff" opacity="0.8"/>
  
  <!-- Vela esquerda -->
  <rect x="24" y="55" width="10" height="28" rx="2" fill="url(#candle)"/>
  <ellipse cx="29" cy="45" rx="5" ry="8" fill="url(#flame)"/>
  <ellipse cx="29" cy="47" rx="2" ry="4" fill="#fff" opacity="0.8"/>
  
  <!-- Vela direita -->
  <rect x="66" y="55" width="10" height="28" rx="2" fill="url(#candle)"/>
  <ellipse cx="71" cy="45" rx="5" ry="8" fill="url(#flame)"/>
  <ellipse cx="71" cy="47" rx="2" ry="4" fill="#fff" opacity="0.8"/>
  
  <!-- Base/altar -->
  <rect x="18" y="83" width="64" height="8" rx="3" fill="#92400e"/>
  <rect x="20" y="85" width="60" height="4" rx="2" fill="#a16207"/>
  
  <!-- Brilhos -->
  <circle cx="50" cy="22" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="29" cy="38" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="71" cy="38" r="2" fill="#fff" opacity="0.5"/>
</svg>
