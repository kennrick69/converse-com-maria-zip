<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="calendar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgTeal)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#99f6e4" stroke-width="3" opacity="0.5"/>
  
  <!-- Calendário -->
  <rect x="25" y="28" width="50" height="50" rx="5" fill="url(#calendar)"/>
  <rect x="25" y="28" width="50" height="14" rx="5" fill="#ef4444"/>
  <rect x="25" y="37" width="50" height="5" fill="#ef4444"/>
  
  <!-- Argolas -->
  <rect x="33" y="24" width="4" height="10" rx="2" fill="#a1a1aa"/>
  <rect x="63" y="24" width="4" height="10" rx="2" fill="#a1a1aa"/>
  
  <!-- Número 15 -->
  <text x="50" y="68" text-anchor="middle" fill="#0f766e" font-family="Arial Black" font-size="24" font-weight="bold">15</text>
  
  <!-- Estrelas -->
  <polygon points="50,18 51,21 54,21 52,23 53,26 50,24 47,26 48,23 46,21 49,21" fill="#fde047"/>
  <circle cx="72" cy="35" r="3" fill="#fde047" opacity="0.8"/>
  <circle cx="28" cy="70" r="2" fill="#fde047" opacity="0.7"/>
</svg>
