<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgZen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="person" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgZen)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#c7d2fe" stroke-width="3" opacity="0.5"/>
  
  <!-- Aura de paz -->
  <circle cx="50" cy="50" r="35" fill="url(#aura)"/>
  
  <!-- Pessoa meditando -->
  <!-- Cabeça -->
  <circle cx="50" cy="32" r="12" fill="url(#person)"/>
  <!-- Olhos fechados -->
  <path d="M44,32 Q46,30 48,32" fill="none" stroke="#92400e" stroke-width="1.5"/>
  <path d="M52,32 Q54,30 56,32" fill="none" stroke="#92400e" stroke-width="1.5"/>
  <!-- Sorriso sereno -->
  <path d="M46,38 Q50,41 54,38" fill="none" stroke="#92400e" stroke-width="1.5"/>
  
  <!-- Corpo sentado -->
  <ellipse cx="50" cy="58" rx="15" ry="10" fill="url(#person)"/>
  
  <!-- Pernas cruzadas -->
  <ellipse cx="40" cy="72" rx="12" ry="6" fill="url(#person)" transform="rotate(-10 40 72)"/>
  <ellipse cx="60" cy="72" rx="12" ry="6" fill="url(#person)" transform="rotate(10 60 72)"/>
  
  <!-- Mãos em oração -->
  <ellipse cx="50" cy="55" rx="6" ry="8" fill="url(#person)"/>
  
  <!-- Auréola sutil -->
  <ellipse cx="50" cy="18" rx="10" ry="4" fill="none" stroke="#fde047" stroke-width="2" opacity="0.6"/>
  
  <!-- Estrelinhas de paz -->
  <circle cx="25" cy="30" r="2" fill="#fef9c3" opacity="0.8"/>
  <circle cx="75" cy="35" r="2" fill="#fef9c3" opacity="0.7"/>
  <circle cx="30" cy="75" r="1.5" fill="#fef9c3" opacity="0.6"/>
  <circle cx="72" cy="70" r="1.5" fill="#fef9c3" opacity="0.6"/>
</svg>
