<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgChat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#fce7f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgChat)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fbcfe8" stroke-width="3" opacity="0.5"/>
  
  <!-- Balão de fala grande -->
  <rect x="20" y="22" width="50" height="35" rx="10" fill="url(#bubble)"/>
  <polygon points="35,57 40,67 45,57" fill="url(#bubble)"/>
  
  <!-- Linhas de texto -->
  <rect x="28" y="32" width="35" height="4" rx="2" fill="#f9a8d4"/>
  <rect x="28" y="40" width="28" height="4" rx="2" fill="#f9a8d4"/>
  <rect x="28" y="48" width="20" height="4" rx="2" fill="#f9a8d4"/>
  
  <!-- Balão de resposta menor (Maria) -->
  <rect x="50" y="55" width="35" height="25" rx="8" fill="#fde047"/>
  <polygon points="75,80 70,88 65,80" fill="#fde047"/>
  
  <!-- Coração na resposta -->
  <path d="M67,65 C64,62 59,64 59,68 C59,72 67,77 67,77 C67,77 75,72 75,68 C75,64 70,62 67,65Z" fill="#ec4899"/>
  
  <!-- Brilhos -->
  <circle cx="25" cy="28" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="80" cy="45" r="2" fill="#fef9c3" opacity="0.7"/>
</svg>
