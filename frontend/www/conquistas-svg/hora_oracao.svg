<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgMint" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="clockFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgMint)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#bbf7d0" stroke-width="3" opacity="0.5"/>
  
  <!-- Relógio -->
  <circle cx="50" cy="50" r="30" fill="url(#clockFace)"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="#16a34a" stroke-width="3"/>
  
  <!-- Marcadores de hora -->
  <circle cx="50" cy="24" r="2" fill="#16a34a"/>
  <circle cx="50" cy="76" r="2" fill="#16a34a"/>
  <circle cx="24" cy="50" r="2" fill="#16a34a"/>
  <circle cx="76" cy="50" r="2" fill="#16a34a"/>
  
  <!-- Ponteiros (mostrando 12h - hora de oração) -->
  <line x1="50" y1="50" x2="50" y2="30" stroke="#166534" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="35" stroke="#15803d" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Centro do relógio -->
  <circle cx="50" cy="50" r="4" fill="#fde047"/>
  <circle cx="50" cy="50" r="2" fill="#eab308"/>
  
  <!-- Brilhos -->
  <ellipse cx="40" cy="40" rx="6" ry="8" fill="#fff" opacity="0.4"/>
  
  <!-- Notinhas musicais (oração) -->
  <text x="78" y="30" fill="#fef9c3" font-size="14">♪</text>
  <text x="18" y="75" fill="#fef9c3" font-size="12">♫</text>
  
  <!-- Texto 1h -->
  <text x="50" y="92" text-anchor="middle" fill="#fef9c3" font-family="Arial Black" font-size="10" font-weight="bold">1 HORA</text>
</svg>
