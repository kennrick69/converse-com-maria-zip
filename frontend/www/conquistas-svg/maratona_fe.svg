<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgEnergy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="runner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef08a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgEnergy)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fed7aa" stroke-width="3" opacity="0.5"/>
  
  <!-- Linhas de velocidade -->
  <line x1="15" y1="40" x2="30" y2="40" stroke="#fef9c3" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="50" x2="28" y2="50" stroke="#fef9c3" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="15" y1="60" x2="30" y2="60" stroke="#fef9c3" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Pessoa correndo (simplificada e fofa) -->
  <!-- Cabeça -->
  <circle cx="55" cy="30" r="10" fill="url(#runner)"/>
  <circle cx="52" cy="28" r="2" fill="#92400e"/>
  <circle cx="58" cy="28" r="2" fill="#92400e"/>
  <path d="M53,33 Q55,36 57,33" fill="none" stroke="#92400e" stroke-width="1.5"/>
  
  <!-- Corpo -->
  <ellipse cx="55" cy="48" rx="10" ry="12" fill="url(#runner)"/>
  
  <!-- Braço de trás -->
  <line x1="50" y1="45" x2="38" y2="55" stroke="url(#runner)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Braço da frente -->
  <line x1="60" y1="45" x2="72" y2="35" stroke="url(#runner)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Perna de trás -->
  <line x1="50" y1="58" x2="35" y2="75" stroke="url(#runner)" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Perna da frente -->
  <line x1="60" y1="58" x2="75" y2="70" stroke="url(#runner)" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Cruz/terço na mão -->
  <rect x="70" y="30" width="4" height="10" rx="1" fill="#fff"/>
  <rect x="67" y="33" width="10" height="4" rx="1" fill="#fff"/>
  
  <!-- Brilhos -->
  <circle cx="52" cy="25" r="2" fill="#fff" opacity="0.7"/>
</svg>
