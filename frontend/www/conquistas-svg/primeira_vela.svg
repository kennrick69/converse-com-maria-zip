<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgYellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde047"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="vela" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="50%" style="stop-color:#fffbeb"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
    <radialGradient id="chama" cx="50%" cy="70%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="30%" style="stop-color:#fde047"/>
      <stop offset="70%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#fde047;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#fde047;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  
  <style>
    .chama { animation: tremular 0.3s ease-in-out infinite alternate; transform-origin: 50% 50%; }
    .chama-nucleo { animation: tremular-rapido 0.2s ease-in-out infinite alternate; transform-origin: 50% 45%; }
    .glow { animation: pulsar-glow 0.5s ease-in-out infinite alternate; }
    .gota1 { animation: escorrer1 3s ease-in-out infinite; }
    .gota2 { animation: escorrer2 4s ease-in-out infinite; }
    
    @keyframes tremular {
      0% { transform: scaleX(0.9) scaleY(1.05); }
      100% { transform: scaleX(1.1) scaleY(0.95); }
    }
    @keyframes tremular-rapido {
      0% { transform: scaleX(0.85) scaleY(1.1); }
      100% { transform: scaleX(1.15) scaleY(0.9); }
    }
    @keyframes pulsar-glow {
      0% { opacity: 0.4; r: 18; }
      100% { opacity: 0.7; r: 22; }
    }
    @keyframes escorrer1 {
      0%, 100% { transform: translateY(0); opacity: 0.8; }
      50% { transform: translateY(8px); opacity: 0.3; }
    }
    @keyframes escorrer2 {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      60% { transform: translateY(10px); opacity: 0.2; }
    }
  </style>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgYellow)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fef9c3" stroke-width="3" opacity="0.5"/>
  
  <!-- Brilho ao redor da chama -->
  <circle cx="50" cy="35" r="20" fill="url(#glow)" class="glow"/>
  
  <!-- Vela -->
  <rect x="40" y="50" width="20" height="35" rx="3" fill="url(#vela)"/>
  <rect x="40" y="50" width="5" height="35" rx="1" fill="#fde68a" opacity="0.5"/>
  
  <!-- Base da vela -->
  <ellipse cx="50" cy="85" rx="12" ry="4" fill="#d97706"/>
  <ellipse cx="50" cy="84" rx="10" ry="3" fill="#f59e0b"/>
  
  <!-- Pavio -->
  <line x1="50" y1="50" x2="50" y2="42" stroke="#44403c" stroke-width="2"/>
  
  <!-- Chama externa -->
  <ellipse cx="50" cy="32" rx="10" ry="16" fill="url(#chama)" class="chama" filter="url(#blur)"/>
  
  <!-- Chama interna (núcleo branco) -->
  <ellipse cx="50" cy="36" rx="4" ry="8" fill="#fff" opacity="0.9" class="chama-nucleo"/>
  
  <!-- Gotinhas de cera escorrendo -->
  <ellipse cx="55" cy="60" rx="2" ry="3" fill="#fef3c7" opacity="0.8" class="gota1"/>
  <ellipse cx="44" cy="70" rx="1.5" ry="2.5" fill="#fef3c7" opacity="0.6" class="gota2"/>
  
  <!-- Reflexo de luz na vela -->
  <ellipse cx="45" cy="55" rx="3" ry="6" fill="#fff" opacity="0.3"/>
</svg>
