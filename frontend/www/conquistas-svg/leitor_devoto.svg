<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgBrown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <linearGradient id="bookCover" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="50%" style="stop-color:#9a3412"/>
      <stop offset="100%" style="stop-color:#7c2d12"/>
    </linearGradient>
    <linearGradient id="pages" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgBrown)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fcd34d" stroke-width="3" opacity="0.5"/>
  
  <!-- Livro aberto -->
  <!-- Página esquerda -->
  <path d="M15,30 Q15,25 50,28 L50,75 Q15,72 15,30Z" fill="url(#pages)"/>
  <!-- Página direita -->
  <path d="M85,30 Q85,25 50,28 L50,75 Q85,72 85,30Z" fill="url(#pages)"/>
  
  <!-- Lombada -->
  <rect x="47" y="26" width="6" height="50" fill="url(#bookCover)"/>
  
  <!-- Linhas de texto esquerda -->
  <line x1="22" y1="40" x2="45" y2="40" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  <line x1="22" y1="48" x2="45" y2="48" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  <line x1="22" y1="56" x2="45" y2="56" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  <line x1="22" y1="64" x2="40" y2="64" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  
  <!-- Linhas de texto direita -->
  <line x1="55" y1="40" x2="78" y2="40" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  <line x1="55" y1="48" x2="78" y2="48" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  <line x1="55" y1="56" x2="78" y2="56" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  <line x1="55" y1="64" x2="70" y2="64" stroke="#d97706" stroke-width="2" opacity="0.4"/>
  
  <!-- Cruz dourada no centro -->
  <rect x="48" y="35" width="4" height="15" rx="1" fill="#fde047"/>
  <rect x="45" y="40" width="10" height="4" rx="1" fill="#fde047"/>
  
  <!-- Brilho -->
  <ellipse cx="30" cy="35" rx="8" ry="5" fill="#fff" opacity="0.3"/>
  
  <!-- Estrelas -->
  <circle cx="25" cy="20" r="2" fill="#fef9c3" opacity="0.8"/>
  <circle cx="78" cy="18" r="2" fill="#fef9c3" opacity="0.7"/>
</svg>
