<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="starGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <radialGradient id="innerFlame" cx="50%" cy="60%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="50%" style="stop-color:#fde047"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgAmber)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fef3c7" stroke-width="3" opacity="0.5"/>
  
  <!-- Estrela grande -->
  <polygon points="50,12 57,35 82,35 62,50 70,75 50,60 30,75 38,50 18,35 43,35" fill="url(#starGold)"/>
  
  <!-- Chama no centro -->
  <ellipse cx="50" cy="45" rx="12" ry="20" fill="url(#innerFlame)"/>
  <ellipse cx="50" cy="50" rx="5" ry="10" fill="#fff" opacity="0.8"/>
  
  <!-- Brilhos na estrela -->
  <polygon points="30,32 33,38 38,35" fill="#fff" opacity="0.5"/>
  <circle cx="45" cy="25" r="2" fill="#fff" opacity="0.7"/>
  
  <!-- Sparkles -->
  <circle cx="22" cy="55" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="78" cy="52" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="35" cy="78" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="68" cy="80" r="1.5" fill="#fff" opacity="0.5"/>
</svg>
