<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgBlueDeep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="heartBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe"/>
      <stop offset="50%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgBlueDeep)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#bfdbfe" stroke-width="3" opacity="0.5"/>
  
  <!-- Coração azul -->
  <path d="M50,80 
           C30,65 12,50 12,35 
           C12,22 22,12 35,12 
           C42,12 48,16 50,22 
           C52,16 58,12 65,12 
           C78,12 88,22 88,35 
           C88,50 70,65 50,80Z" 
        fill="url(#heartBlue)"/>
  
  <!-- Cruz dourada no centro -->
  <rect x="46" y="30" width="8" height="30" rx="2" fill="#fde047"/>
  <rect x="38" y="38" width="24" height="8" rx="2" fill="#fde047"/>
  <!-- Brilho na cruz -->
  <rect x="47" y="31" width="3" height="12" fill="#fef9c3" opacity="0.6"/>
  
  <!-- Brilho no coração -->
  <ellipse cx="30" cy="32" rx="8" ry="10" fill="#fff" opacity="0.3"/>
  <circle cx="28" cy="28" r="3" fill="#fff" opacity="0.6"/>
  
  <!-- Raios saindo do coração -->
  <line x1="25" y1="60" x2="18" y2="68" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="75" y1="60" x2="82" y2="68" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="85" x2="50" y2="92" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
</svg>
