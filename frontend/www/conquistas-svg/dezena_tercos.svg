<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgIndigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="hands" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="glow" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#fef9c3;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgIndigo)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#c7d2fe" stroke-width="3" opacity="0.5"/>
  
  <!-- Brilho atrás -->
  <ellipse cx="50" cy="45" rx="25" ry="30" fill="url(#glow)"/>
  
  <!-- Mãos em oração -->
  <path d="M50,25 L42,55 Q42,70 50,75 Q58,70 58,55 L50,25" fill="url(#hands)"/>
  <line x1="50" y1="30" x2="50" y2="70" stroke="#ca8a04" stroke-width="1" opacity="0.3"/>
  
  <!-- Dedos -->
  <path d="M44,35 Q40,40 42,55" fill="none" stroke="#eab308" stroke-width="2"/>
  <path d="M56,35 Q60,40 58,55" fill="none" stroke="#eab308" stroke-width="2"/>
  
  <!-- Brilho nas mãos -->
  <ellipse cx="46" cy="45" rx="3" ry="8" fill="#fff" opacity="0.4"/>
  
  <!-- Número 10 -->
  <text x="50" y="90" text-anchor="middle" fill="#fef9c3" font-family="Arial Black" font-size="14" font-weight="bold">×10</text>
  
  <!-- Raios de luz -->
  <line x1="50" y1="15" x2="50" y2="8" stroke="#fef9c3" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="20" x2="30" y2="14" stroke="#fef9c3" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="20" x2="70" y2="14" stroke="#fef9c3" stroke-width="2" stroke-linecap="round"/>
</svg>
