<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="25%" style="stop-color:#fb923c"/>
      <stop offset="50%" style="stop-color:#facc15"/>
      <stop offset="75%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="70%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="50%" style="stop-color:#fde047"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgRainbow)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fff" stroke-width="3" opacity="0.4"/>
  
  <!-- 7 velas coloridas -->
  <!-- Vermelha -->
  <rect x="15" y="55" width="7" height="25" rx="2" fill="#ef4444"/>
  <ellipse cx="18.5" cy="48" rx="4" ry="6" fill="url(#flame)"/>
  
  <!-- Laranja -->
  <rect x="24" y="50" width="7" height="30" rx="2" fill="#f97316"/>
  <ellipse cx="27.5" cy="42" rx="4" ry="6" fill="url(#flame)"/>
  
  <!-- Amarela -->
  <rect x="33" y="45" width="7" height="35" rx="2" fill="#facc15"/>
  <ellipse cx="36.5" cy="37" rx="4" ry="6" fill="url(#flame)"/>
  
  <!-- Verde -->
  <rect x="42" y="40" width="7" height="40" rx="2" fill="#4ade80"/>
  <ellipse cx="45.5" cy="32" rx="4" ry="6" fill="url(#flame)"/>
  
  <!-- Azul -->
  <rect x="51" y="45" width="7" height="35" rx="2" fill="#60a5fa"/>
  <ellipse cx="54.5" cy="37" rx="4" ry="6" fill="url(#flame)"/>
  
  <!-- Índigo -->
  <rect x="60" y="50" width="7" height="30" rx="2" fill="#818cf8"/>
  <ellipse cx="63.5" cy="42" rx="4" ry="6" fill="url(#flame)"/>
  
  <!-- Violeta -->
  <rect x="69" y="55" width="7" height="25" rx="2" fill="#c084fc"/>
  <ellipse cx="72.5" cy="48" rx="4" ry="6" fill="url(#flame)"/>
  
  <!-- Base -->
  <rect x="12" y="80" width="67" height="6" rx="2" fill="#78350f"/>
  
  <!-- Brilhos -->
  <circle cx="45.5" cy="28" r="2" fill="#fff" opacity="0.8"/>
</svg>
