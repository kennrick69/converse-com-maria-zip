<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgHoly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef08a"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </linearGradient>
    <linearGradient id="robe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <linearGradient id="haloGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fde047"/>
      <stop offset="50%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#fde047"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#fef9c3;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <style>
    .aureola { animation: brilhar-aureola 1.5s ease-in-out infinite alternate; }
    .raio1 { animation: pulsar-raio 1s ease-in-out infinite; }
    .raio2 { animation: pulsar-raio 1s ease-in-out infinite 0.3s; }
    .raio3 { animation: pulsar-raio 1s ease-in-out infinite 0.6s; }
    .corpo { animation: respirar 3s ease-in-out infinite; transform-origin: 50px 60px; }
    .glow-bg { animation: glow-pulse 2s ease-in-out infinite alternate; }
    .estrela1 { animation: twinkle 1.5s ease-in-out infinite; }
    .estrela2 { animation: twinkle 1.2s ease-in-out infinite 0.4s; }
    .estrela3 { animation: twinkle 1.8s ease-in-out infinite 0.8s; }
    .estrela4 { animation: twinkle 1.3s ease-in-out infinite 1.2s; }
    
    @keyframes brilhar-aureola {
      0% { stroke-width: 3; opacity: 0.7; filter: none; }
      100% { stroke-width: 5; opacity: 1; filter: url(#glow-filter); }
    }
    @keyframes pulsar-raio {
      0%, 100% { opacity: 0.4; transform: scaleY(0.9); }
      50% { opacity: 0.8; transform: scaleY(1.1); }
    }
    @keyframes respirar {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(1.02); }
    }
    @keyframes glow-pulse {
      0% { opacity: 0.4; r: 30; }
      100% { opacity: 0.7; r: 38; }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgHoly)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fef9c3" stroke-width="3" opacity="0.5"/>
  
  <!-- Brilho divino atrás (pulsa) -->
  <circle cx="50" cy="40" r="35" fill="url(#glow)" class="glow-bg"/>
  
  <!-- Raios de luz (pulsam em sequência) -->
  <line x1="50" y1="5" x2="50" y2="15" stroke="#fff" stroke-width="3" class="raio1" transform-origin="50px 10px"/>
  <line x1="25" y1="15" x2="32" y2="22" stroke="#fff" stroke-width="3" class="raio2" transform-origin="28px 18px"/>
  <line x1="75" y1="15" x2="68" y2="22" stroke="#fff" stroke-width="3" class="raio3" transform-origin="72px 18px"/>
  
  <!-- Auréola (brilha) -->
  <ellipse cx="50" cy="22" rx="18" ry="6" fill="none" stroke="url(#haloGold)" stroke-width="4" class="aureola"/>
  
  <g class="corpo">
    <!-- Cabeça -->
    <circle cx="50" cy="38" r="14" fill="url(#skin)"/>
    
    <!-- Olhos felizes -->
    <circle cx="45" cy="36" r="2.5" fill="#78350f"/>
    <circle cx="55" cy="36" r="2.5" fill="#78350f"/>
    <circle cx="44" cy="35" r="1" fill="#fff"/>
    <circle cx="54" cy="35" r="1" fill="#fff"/>
    
    <!-- Bochechas -->
    <ellipse cx="40" cy="42" rx="3" ry="2" fill="#fda4af" opacity="0.5"/>
    <ellipse cx="60" cy="42" rx="3" ry="2" fill="#fda4af" opacity="0.5"/>
    
    <!-- Sorriso sereno -->
    <path d="M45,44 Q50,48 55,44" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Túnica/manto -->
    <path d="M35,52 Q30,75 35,88 L65,88 Q70,75 65,52 Q50,48 35,52Z" fill="url(#robe)"/>
    
    <!-- Mãos em oração -->
    <ellipse cx="50" cy="65" rx="8" ry="10" fill="url(#skin)"/>
    
    <!-- Detalhe da túnica -->
    <line x1="50" y1="55" x2="50" y2="85" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Estrelinhas (twinkle) -->
  <circle cx="18" cy="50" r="2" fill="#fff" class="estrela1"/>
  <circle cx="82" cy="55" r="2" fill="#fff" class="estrela2"/>
  <circle cx="25" cy="80" r="1.5" fill="#fff" class="estrela3"/>
  <circle cx="78" cy="78" r="1.5" fill="#fff" class="estrela4"/>
</svg>
