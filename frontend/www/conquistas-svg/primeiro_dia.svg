<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="terra" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a16207"/>
      <stop offset="100%" style="stop-color:#713f12"/>
    </linearGradient>
    <linearGradient id="broto" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    .planta { animation: crescer 2s ease-in-out infinite alternate; transform-origin: 50% 72%; }
    .folha-esq { animation: balanca-esq 1.5s ease-in-out infinite alternate; transform-origin: 50% 52%; }
    .folha-dir { animation: balanca-dir 1.5s ease-in-out infinite alternate; transform-origin: 50% 52%; }
    .gota { animation: pingar 2s ease-in-out infinite; }
    .brilho { animation: pulse 1s ease-in-out infinite alternate; }
    
    @keyframes crescer {
      0% { transform: scaleY(0.95); }
      100% { transform: scaleY(1.05); }
    }
    @keyframes balanca-esq {
      0% { transform: rotate(-5deg); }
      100% { transform: rotate(5deg); }
    }
    @keyframes balanca-dir {
      0% { transform: rotate(5deg); }
      100% { transform: rotate(-5deg); }
    }
    @keyframes pingar {
      0%, 100% { transform: translateY(0); opacity: 0.8; }
      50% { transform: translateY(5px); opacity: 0; }
    }
    @keyframes pulse {
      0% { opacity: 0.4; }
      100% { opacity: 0.8; }
    }
  </style>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgGreen)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#86efac" stroke-width="3" opacity="0.5"/>
  
  <!-- Terra -->
  <ellipse cx="50" cy="72" rx="22" ry="8" fill="url(#terra)"/>
  <path d="M28,72 Q30,80 50,82 Q70,80 72,72 Z" fill="#713f12"/>
  
  <g class="planta">
    <!-- Caule -->
    <path d="M50,72 Q48,60 50,45" stroke="#16a34a" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Folha esquerda -->
    <g class="folha-esq">
      <ellipse cx="40" cy="50" rx="12" ry="6" fill="url(#broto)" transform="rotate(-30 40 50)"/>
      <path d="M40,50 Q45,48 50,52" stroke="#16a34a" stroke-width="1.5" fill="none"/>
      <ellipse cx="38" cy="47" rx="3" ry="2" fill="#fff" opacity="0.6" transform="rotate(-30 38 47)" class="brilho"/>
    </g>
    
    <!-- Folha direita -->
    <g class="folha-dir">
      <ellipse cx="60" cy="50" rx="12" ry="6" fill="url(#broto)" transform="rotate(30 60 50)"/>
      <path d="M60,50 Q55,48 50,52" stroke="#16a34a" stroke-width="1.5" fill="none"/>
      <ellipse cx="62" cy="47" rx="3" ry="2" fill="#fff" opacity="0.6" transform="rotate(30 62 47)" class="brilho"/>
    </g>
  </g>
  
  <!-- Gotinha de água -->
  <ellipse cx="65" cy="55" rx="3" ry="4" fill="#60a5fa" opacity="0.8" class="gota"/>
  <circle cx="64" cy="53" r="1" fill="#fff" opacity="0.8" class="gota"/>
</svg>
