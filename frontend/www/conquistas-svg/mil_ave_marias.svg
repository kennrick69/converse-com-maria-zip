<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgCosmic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="40%" style="stop-color:#fef08a"/>
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgCosmic)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#ddd6fe" stroke-width="3" opacity="0.5"/>
  
  <!-- Glow central -->
  <circle cx="50" cy="45" r="25" fill="url(#starGlow)"/>
  
  <!-- Estrela de 8 pontas -->
  <polygon points="50,15 54,38 75,30 58,45 75,60 54,52 50,75 46,52 25,60 42,45 25,30 46,38" fill="#fde047"/>
  <polygon points="50,22 53,40 68,34 56,45 68,56 53,50 50,68 47,50 32,56 44,45 32,34 47,40" fill="#fef9c3"/>
  
  <!-- Centro brilhante -->
  <circle cx="50" cy="45" r="8" fill="#fff"/>
  <circle cx="48" cy="43" r="3" fill="#fef9c3"/>
  
  <!-- 1000 -->
  <text x="50" y="90" text-anchor="middle" fill="#fef9c3" font-family="Arial Black" font-size="12" font-weight="bold">1000</text>
  
  <!-- Estrelinhas menores -->
  <circle cx="25" cy="25" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="78" cy="22" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="20" cy="65" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="82" cy="70" r="2" fill="#fff" opacity="0.7"/>
</svg>
