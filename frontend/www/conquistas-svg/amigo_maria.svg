<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgWarm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fda4af"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgWarm)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fecdd3" stroke-width="3" opacity="0.5"/>
  
  <!-- Carinha feliz grande -->
  <circle cx="50" cy="50" r="30" fill="url(#face)"/>
  
  <!-- Olhos felizes (sorridentes) -->
  <path d="M35,45 Q40,38 45,45" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <path d="M55,45 Q60,38 65,45" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Bochechas coradas -->
  <ellipse cx="32" cy="55" rx="6" ry="4" fill="#fda4af" opacity="0.6"/>
  <ellipse cx="68" cy="55" rx="6" ry="4" fill="#fda4af" opacity="0.6"/>
  
  <!-- Sorriso grande -->
  <path d="M35,58 Q50,75 65,58" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Braços abraçando (sugerido) -->
  <path d="M18,55 Q10,50 15,40" fill="none" stroke="url(#face)" stroke-width="8" stroke-linecap="round"/>
  <path d="M82,55 Q90,50 85,40" fill="none" stroke="url(#face)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Corações flutuando -->
  <path d="M22,25 C20,22 16,24 16,27 C16,30 22,34 22,34 C22,34 28,30 28,27 C28,24 24,22 22,25Z" fill="#fff" opacity="0.9"/>
  <path d="M78,28 C77,26 74,27 74,29 C74,31 78,34 78,34 C78,34 82,31 82,29 C82,27 79,26 78,28Z" fill="#fff" opacity="0.8"/>
  
  <!-- Brilho -->
  <circle cx="40" cy="40" r="4" fill="#fff" opacity="0.5"/>
</svg>
