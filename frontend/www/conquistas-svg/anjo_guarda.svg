<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="aureola" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fde047"/>
      <stop offset="50%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#fde047"/>
    </linearGradient>
    <linearGradient id="pele" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="asas" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    .asa-esq { animation: bater-esq 0.8s ease-in-out infinite; transform-origin: 43px 50px; }
    .asa-dir { animation: bater-dir 0.8s ease-in-out infinite; transform-origin: 57px 50px; }
    .aureola { animation: brilhar-aureola 1.5s ease-in-out infinite alternate; }
    .corpo { animation: flutuar 2s ease-in-out infinite; }
    .estrela1 { animation: twinkle 1.2s ease-in-out infinite; }
    .estrela2 { animation: twinkle 1s ease-in-out infinite 0.4s; }
    .estrela3 { animation: twinkle 1.4s ease-in-out infinite 0.8s; }
    .nuvem { animation: flutuar-nuvem 3s ease-in-out infinite; }
    
    @keyframes bater-esq {
      0%, 100% { transform: rotate(0deg) scaleX(1); }
      50% { transform: rotate(-15deg) scaleX(0.9); }
    }
    @keyframes bater-dir {
      0%, 100% { transform: rotate(0deg) scaleX(1); }
      50% { transform: rotate(15deg) scaleX(0.9); }
    }
    @keyframes brilhar-aureola {
      0% { opacity: 0.6; stroke-width: 2; }
      100% { opacity: 1; stroke-width: 4; }
    }
    @keyframes flutuar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    @keyframes flutuar-nuvem {
      0%, 100% { transform: translateX(0); opacity: 0.4; }
      50% { transform: translateX(3px); opacity: 0.5; }
    }
  </style>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgSky)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#bfdbfe" stroke-width="3" opacity="0.5"/>
  
  <!-- Nuvens de fundo -->
  <ellipse cx="25" cy="75" rx="15" ry="8" fill="#fff" opacity="0.4" class="nuvem"/>
  <ellipse cx="75" cy="72" rx="12" ry="6" fill="#fff" opacity="0.3" class="nuvem"/>
  <ellipse cx="50" cy="80" rx="20" ry="8" fill="#fff" opacity="0.5"/>
  
  <!-- Asa esquerda -->
  <g class="asa-esq">
    <ellipse cx="28" cy="50" rx="15" ry="22" fill="url(#asas)"/>
    <path d="M22,40 Q28,50 22,60" fill="none" stroke="#c7d2fe" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Asa direita -->
  <g class="asa-dir">
    <ellipse cx="72" cy="50" rx="15" ry="22" fill="url(#asas)"/>
    <path d="M78,40 Q72,50 78,60" fill="none" stroke="#c7d2fe" stroke-width="2" opacity="0.6"/>
  </g>
  
  <g class="corpo">
    <!-- Corpo/vestido -->
    <path d="M40,55 Q38,75 50,78 Q62,75 60,55 Z" fill="#e0e7ff"/>
    
    <!-- Cabeça -->
    <circle cx="50" cy="42" r="14" fill="url(#pele)"/>
    
    <!-- Cabelo -->
    <ellipse cx="50" cy="35" rx="12" ry="8" fill="#fcd34d"/>
    <circle cx="42" cy="38" r="5" fill="#fcd34d"/>
    <circle cx="58" cy="38" r="5" fill="#fcd34d"/>
    
    <!-- Auréola (animada) -->
    <ellipse cx="50" cy="24" rx="12" ry="4" fill="none" stroke="url(#aureola)" stroke-width="3" class="aureola"/>
    
    <!-- Rosto -->
    <ellipse cx="45" cy="42" rx="3" ry="4" fill="#1e3a5f"/>
    <ellipse cx="55" cy="42" rx="3" ry="4" fill="#1e3a5f"/>
    <circle cx="44" cy="41" r="1" fill="#fff"/>
    <circle cx="54" cy="41" r="1" fill="#fff"/>
    
    <!-- Bochechas -->
    <ellipse cx="40" cy="48" rx="3" ry="2" fill="#fda4af" opacity="0.5"/>
    <ellipse cx="60" cy="48" rx="3" ry="2" fill="#fda4af" opacity="0.5"/>
    
    <!-- Sorriso -->
    <path d="M46,50 Q50,54 54,50" fill="none" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Mãos -->
    <ellipse cx="50" cy="62" rx="6" ry="8" fill="url(#pele)"/>
  </g>
  
  <!-- Estrelinhas (twinkle) -->
  <circle cx="20" cy="30" r="2" fill="#fef9c3" class="estrela1"/>
  <circle cx="80" cy="35" r="1.5" fill="#fef9c3" class="estrela2"/>
  <circle cx="30" cy="20" r="1.5" fill="#fef9c3" class="estrela3"/>
</svg>
