<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgViolet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="number9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#fde047;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#fde047;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#bgViolet)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#ddd6fe" stroke-width="3" opacity="0.5"/>
  
  <!-- Halo de luz -->
  <circle cx="50" cy="50" r="32" fill="url(#halo)"/>
  
  <!-- Número 9 estilizado -->
  <text x="50" y="62" text-anchor="middle" fill="url(#number9)" font-family="Arial Black" font-size="50" font-weight="bold">9</text>
  
  <!-- Borda brilhante no 9 -->
  <text x="50" y="62" text-anchor="middle" fill="none" stroke="#fff" stroke-width="2" font-family="Arial Black" font-size="50" font-weight="bold" opacity="0.4">9</text>
  
  <!-- Dias ao redor (9 pontos) -->
  <circle cx="50" cy="15" r="4" fill="#fde047"/>
  <circle cx="72" cy="22" r="4" fill="#fde047"/>
  <circle cx="85" cy="45" r="4" fill="#fde047"/>
  <circle cx="78" cy="72" r="4" fill="#fde047"/>
  <circle cx="55" cy="88" r="4" fill="#fde047"/>
  <circle cx="28" cy="78" r="4" fill="#fde047"/>
  <circle cx="15" cy="55" r="4" fill="#fde047"/>
  <circle cx="18" cy="30" r="4" fill="#fde047"/>
  <circle cx="38" cy="15" r="4" fill="#fde047"/>
  
  <!-- Brilhos nos pontos -->
  <circle cx="49" cy="14" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="84" cy="44" r="1.5" fill="#fff" opacity="0.8"/>
</svg>
