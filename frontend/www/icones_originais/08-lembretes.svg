<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bellGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="bellInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <filter id="bellGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Ondas de som -->
  <path d="M8 32 Q4 32 4 28" stroke="#FFD700" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M10 38 Q4 38 4 30" stroke="#FFD700" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M56 32 Q60 32 60 28" stroke="#FFD700" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M54 38 Q60 38 60 30" stroke="#FFD700" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
  
  <!-- Brilhos decorativos -->
  <circle cx="12" cy="10" r="2.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="52" cy="8" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="8" cy="52" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="56" cy="50" r="2.5" fill="#FFD700" opacity="0.5"/>
  
  <!-- Estrelinhas maiores -->
  <path d="M10 22L12 26L10 30L14 28L18 30L16 26L18 22L14 24L10 22Z" fill="#FFD700"/>
  <path d="M46 22L48 26L46 30L50 28L54 30L52 26L54 22L50 24L46 22Z" fill="#FFD700"/>
  <path d="M28 4L30 8L28 12L32 10L36 12L34 8L36 4L32 6L28 4Z" fill="#FF69B4"/>
  
  <!-- Alça do sino -->
  <path d="M28 14 Q28 8 32 8 Q36 8 36 14" stroke="url(#bellGold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Corpo do sino -->
  <path d="M16 46 Q16 24 32 20 Q48 24 48 46 Z" 
        fill="url(#bellGold)" 
        stroke="#B8860B" 
        stroke-width="2"
        filter="url(#bellGlow)"/>
  
  <!-- Abertura inferior do sino -->
  <ellipse cx="32" cy="46" rx="16" ry="4" fill="url(#bellInner)"/>
  
  <!-- Interior do sino (sombra) -->
  <ellipse cx="32" cy="44" rx="12" ry="3" fill="#8B6914" opacity="0.5"/>
  
  <!-- Badalo -->
  <line x1="32" y1="28" x2="32" y2="42" stroke="#B8860B" stroke-width="2"/>
  <circle cx="32" cy="44" r="4" fill="url(#bellGold)" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Brilho no sino -->
  <ellipse cx="24" cy="30" rx="4" ry="6" fill="white" opacity="0.3"/>
  
  <!-- Laço decorativo no topo -->
  <path d="M26 14 Q24 10 28 10 Q32 8 36 10 Q40 10 38 14" fill="#DC143C" opacity="0.8"/>
  
  <!-- Bolinha do laço -->
  <circle cx="32" cy="10" r="3" fill="#DC143C"/>
  <circle cx="31" cy="9" r="1" fill="white" opacity="0.4"/>
  
  <!-- Notificação (bolinha) -->
  <circle cx="48" cy="16" r="6" fill="#FF4444" stroke="white" stroke-width="2"/>
  <text x="48" y="19" font-size="8" fill="white" text-anchor="middle" font-weight="bold">!</text>
</svg>
