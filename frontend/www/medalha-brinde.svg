<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <!-- Gradiente da caixa de veludo -->
    <linearGradient id="veludo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1942"/>
      <stop offset="50%" style="stop-color:#2d1a2d"/>
      <stop offset="100%" style="stop-color:#1a0d1a"/>
    </linearGradient>
    
    <!-- Gradiente dourado -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f"/>
      <stop offset="25%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#f4d03f"/>
      <stop offset="75%" style="stop-color:#c9a227"/>
      <stop offset="100%" style="stop-color:#d4af37"/>
    </linearGradient>
    
    <!-- Brilho -->
    <radialGradient id="brilho" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Sombra -->
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    
    <!-- Brilho animado -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0">
        <animate attributeName="offset" values="-0.5;1.5" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0.6">
        <animate attributeName="offset" values="0;2" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0">
        <animate attributeName="offset" values="0.5;2.5" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  
  <!-- Caixa de veludo (base) -->
  <rect x="20" y="40" width="160" height="160" rx="15" ry="15" fill="url(#veludo)" filter="url(#sombra)"/>
  
  <!-- Borda dourada da caixa -->
  <rect x="20" y="40" width="160" height="160" rx="15" ry="15" fill="none" stroke="url(#gold)" stroke-width="3"/>
  
  <!-- Interior da caixa (almofada) -->
  <ellipse cx="100" cy="120" rx="60" ry="50" fill="#1a0d1a"/>
  <ellipse cx="100" cy="120" rx="55" ry="45" fill="#2d1a2d"/>
  
  <!-- Medalha oval -->
  <ellipse cx="100" cy="115" rx="38" ry="48" fill="url(#gold)" filter="url(#sombra)"/>
  
  <!-- Detalhe interno da medalha -->
  <ellipse cx="100" cy="115" rx="32" ry="42" fill="none" stroke="#c9a227" stroke-width="1.5"/>
  
  <!-- Silhueta de Nossa Senhora -->
  <g fill="#b8960c">
    <!-- Cabeça com auréola -->
    <circle cx="100" cy="82" r="8"/>
    <!-- Auréola -->
    <ellipse cx="100" cy="78" rx="12" ry="5" fill="none" stroke="#b8960c" stroke-width="1"/>
    <!-- Corpo/manto -->
    <path d="M100,90 Q85,100 80,130 Q85,145 100,150 Q115,145 120,130 Q115,100 100,90" />
    <!-- Braços abertos -->
    <path d="M80,105 Q70,110 68,115 M120,105 Q130,110 132,115" fill="none" stroke="#b8960c" stroke-width="3" stroke-linecap="round"/>
    <!-- Raios de graça -->
    <line x1="75" y1="120" x2="68" y2="135" stroke="#c9a227" stroke-width="1"/>
    <line x1="78" y1="122" x2="72" y2="138" stroke="#c9a227" stroke-width="1"/>
    <line x1="125" y1="120" x2="132" y2="135" stroke="#c9a227" stroke-width="1"/>
    <line x1="122" y1="122" x2="128" y2="138" stroke="#c9a227" stroke-width="1"/>
  </g>
  
  <!-- Argola da medalha -->
  <ellipse cx="100" cy="62" rx="8" ry="10" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <ellipse cx="100" cy="62" rx="4" ry="6" fill="#2d1a2d"/>
  
  <!-- Brilho na medalha -->
  <ellipse cx="100" cy="115" rx="38" ry="48" fill="url(#brilho)"/>
  
  <!-- Texto decorativo -->
  <text x="100" y="205" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="11" font-style="italic">Medalha Milagrosa</text>
  
  <!-- Laço/fita decorativa -->
  <g fill="#9333ea">
    <path d="M70,35 Q60,25 55,35 Q60,45 70,40 Z"/>
    <path d="M130,35 Q140,25 145,35 Q140,45 130,40 Z"/>
    <circle cx="100" cy="38" r="8" fill="#7c3aed"/>
    <rect x="95" y="30" width="10" height="16" fill="#7c3aed"/>
  </g>
  
  <!-- Estrelinhas decorativas -->
  <text x="35" y="55" fill="#f4d03f" font-size="10">✦</text>
  <text x="160" y="55" fill="#f4d03f" font-size="10">✦</text>
  <text x="30" y="190" fill="#f4d03f" font-size="8">✦</text>
  <text x="165" y="190" fill="#f4d03f" font-size="8">✦</text>
</svg>
