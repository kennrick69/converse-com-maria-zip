<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flameOuter" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="40%" style="stop-color:#FF6B00"/>
      <stop offset="70%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFFACD"/>
    </linearGradient>
    <linearGradient id="flameCore" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFF00"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Aura de calor -->
  <ellipse cx="32" cy="34" rx="26" ry="28" fill="#FF4500" opacity="0.15"/>
  
  <!-- Brilhos decorativos -->
  <circle cx="8" cy="12" r="2.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="56" cy="10" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="6" cy="50" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="58" cy="48" r="2.5" fill="#FFD700" opacity="0.5"/>
  
  <!-- Faíscas -->
  <circle cx="14" cy="24" r="2" fill="#FF6B00" opacity="0.7"/>
  <circle cx="50" cy="22" r="1.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="18" cy="16" r="1.5" fill="#FFA500" opacity="0.6"/>
  <circle cx="46" cy="14" r="2" fill="#FF8C00" opacity="0.7"/>
  
  <!-- Estrelinhas -->
  <path d="M8 32L10 36L8 40L12 38L16 40L14 36L16 32L12 34L8 32Z" fill="#FFD700" opacity="0.7"/>
  <path d="M48 32L50 36L48 40L52 38L56 40L54 36L56 32L52 34L48 32Z" fill="#FFD700" opacity="0.7"/>
  
  <!-- Chama externa (maior) -->
  <path d="M32 4 
           Q42 16 44 28 
           Q46 40 40 50 
           Q36 56 32 58 
           Q28 56 24 50 
           Q18 40 20 28 
           Q22 16 32 4Z" 
        fill="url(#flameOuter)" 
        filter="url(#fireGlow)"/>
  
  <!-- Chama interna (média) -->
  <path d="M32 12 
           Q38 22 40 30 
           Q42 40 36 48 
           Q34 52 32 54 
           Q30 52 28 48 
           Q22 40 24 30 
           Q26 22 32 12Z" 
        fill="url(#flameInner)"/>
  
  <!-- Núcleo da chama (mais brilhante) -->
  <path d="M32 24 
           Q36 32 36 38 
           Q36 46 32 50 
           Q28 46 28 38 
           Q28 32 32 24Z" 
        fill="url(#flameCore)" 
        opacity="0.9"/>
  
  <!-- Brilho central -->
  <ellipse cx="32" cy="40" rx="3" ry="6" fill="white" opacity="0.5"/>
  
  <!-- Detalhes de movimento -->
  <path d="M26 18 Q24 22 26 26" stroke="#FFFF00" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M38 18 Q40 22 38 26" stroke="#FFFF00" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- Base da chama -->
  <ellipse cx="32" cy="56" rx="8" ry="3" fill="#8B4513" opacity="0.6"/>
</svg>
